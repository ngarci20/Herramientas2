</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
            <a class="navbar-brand" href="./index.html">
                <img src="assets/images/logo.png" id="logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">

            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">

                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./bands.html">Bands</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./about.html">About</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="./contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <h1>Want to assist?</h1>
        <h2>Get your tickets!</h2>
        <form>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="name">First Name</label>
                    <input type="text" class="form-control" id="name" placeholder="First name">
                </div>
                <div class="form-group col-md-6">
                    <label for="lastname">Last Name</label>
                    <input type="text" class="form-control" id="lastname" placeholder="Last name">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Email">
                </div>
                <div class="form-group col-md-6">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Password">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-12">
                    <label for="address">Address</label>
                    <input type="text" class="form-control" id="address" placeholder="1234 Main St">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="city">City</label>
                    <input type="text" class="form-control" id="city">
                </div>
                <div class="form-group col-md-6">
                    <label for="state">State</label>
                    <input type="text" class="form-control" id="state">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-12">
                   <label for="quantity">How many tickets do you want?</label>
                    <select class="custom-select" id="quantity">
                        <option selected>Pick a number</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Buy tickets!</button>
        </form>
    </main>
    <footer>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark static-bottom">
            <a class="navbar-brand" href="#">heartsbeatloud@info.com</a>
            <div class="card bg-transparent border-0 ml-auto">

                    <a class="text-light" href="#"><i class="fa fa-facebook-square fa-fw fa-2x"></i></a>

                    <a class="text-light" href="#"><i class="fa fa-twitter-square fa-fw fa-2x"></i></a>

                    <a class="text-light" href="#"><i class="fa fa-instagram fa-fw fa-2x"></i></a>

                    <a class="text-light" href="#"><i class="fa fa-linkedin fa-fw fa-2x"></i></a>

                </div>
            </div>
        </nav>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
